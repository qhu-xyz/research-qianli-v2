# Apply to all files without commiting:
#   pre-commit run --all-files
# Update this file:
#   pre-commit autoupdate
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: fix-byte-order-marker
      - id: check-case-conflict
      - id: check-docstring-first
      - id: check-executables-have-shebangs
      - id: check-json
      - id: check-yaml
      - id: debug-statements
      - id: detect-aws-credentials
        args: [ --allow-missing-credentials ]
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
      - id: name-tests-test
        args: [--pytest-test-first]
      - id: pretty-format-json
        args: [--autofix]
        exclude: \.ipynb$|^.vscode|^notebooks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.11.7
    hooks:
      # Run the linter.
      - id: ruff
        types_or: [ python, pyi ]
        args: [ --fix ]
      # Run the formatter.
      - id: ruff-format
        types_or: [ python, pyi ]

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.10.1
    hooks:
      - id: pyupgrade
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.4.1
    hooks:
      - id: mypy
        args: [ --ignore-missing-imports ]
        additional_dependencies: [ types-PyYAML, types-cachetools, types-pytz, types-python-dateutil, types-requests ]
  - repo: https://github.com/asottile/blacken-docs
    rev: 1.15.0
    hooks:
      - id: blacken-docs
        additional_dependencies:
          # - black==20.8b1
          - black==23.7.0
  - repo: https://github.com/astral-sh/uv-pre-commit
    # uv version.
    rev: 0.6.14
    hooks:
      - id: uv-lock
  - repo: local
    hooks:
      - id: remove-exec
        name: Remove exec bit
        entry: bash -c 'FILES=$(git diff --cached --name-only --diff-filter=AM | grep "\.py$" || true); if [ -n "$FILES" ]; then chmod -x $FILES; fi'
        language: system
        pass_filenames: false
      - id: ticket
        name: check for ticket number
        language: pygrep
        entry: '\A(?!.*\[([A-Z]{3,}-){0,1}[0-9]{4,}\])'
        args: [ --multiline ]
        stages: [ commit-msg ]
